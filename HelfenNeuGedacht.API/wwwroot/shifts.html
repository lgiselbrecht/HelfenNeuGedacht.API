    <main class="main-content">
        <header class="page-header">
            <div class="page-title">
                <h1>Dienste</h1>
                <p>Verwalten Sie Ihre Dienstvorlagen</p>
            </div>
            <button class="btn-primary" id="showShiftFormBtn">
                <svg width="16" height="16" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path>
                </svg>
                NEUEN DIENST ERSTELLEN
            </button>
        </header>

        <form id="createShiftForm" class="form-container" style="display: none;">
            <input type="text" id="shiftTitle" placeholder="Dienstbezeichnung" required>
            <textarea id="shiftDescription" placeholder="Beschreibung" rows="3" required></textarea>
            <input type="text" id="shiftRequirements" placeholder="Anforderungen">
            <input type="number" id="shiftAgeRestriction" placeholder="Altersbeschränkung">
            <input type="number" id="shiftPoints" placeholder="Punkte">
            <div class="form-actions-row">
                <button type="submit" class="btn-primary">Speichern</button>
                <button type="button" id="cancelShiftFormBtn" class="btn-secondary">Abbrechen</button>
            </div>
        </form>

        <div class="shift-grid" id="cardwrapper"></div>
    </main>

    <!-- Shift Details Modal -->
    <div class="modal-overlay" id="shiftDetailsModal">
        <div class="modal-content">
            <div class="modal-header">
                <div class="modal-header-top">
                    <div class="modal-header-title">
                        <div class="modal-header-icon"></div>
                        <h2 id="modalShiftTitle">Lade Dienst...</h2>
                    </div>
                    <button class="modal-close-btn" id="closeShiftModalBtn">
                        <svg width="24" height="24" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                  d="M6 18L18 6M6 6l12 12"></path>
                        </svg>
                    </button>
                </div>
            </div>
            <div class="modal-body">
                <table>
                    <tr>
                        <td>Beschreibung</td>
                        <td id="modalShiftDescription">Beschreibung...</td>
                    </tr>
                    <tr>
                        <td>Anforderungen</td>
                        <td id="modalShiftRequirements">Anforderungen...</td>
                    </tr>
                    <tr>
                        <td>Altersbeschränkdung</td>
                        <td id="modalShiftAgeRestriction">Alterseinschränkung...</td>
                    </tr>
                    <tr>
                        <td>Punkte</td>
                        <td id="modalShiftPointes">Punkte...</td>
                    </tr>
                </table>
               
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="config.js"></script>
    <script src="auth.js"></script>
    <script>
        // Auth-Guard: Prüfe ob Benutzer eingeloggt ist
        requireAuth();

        function loadShiftDetails(shiftId) {
            // Verhindert, dass der # Link die Seite nach oben springen lässt
            if (event) event.preventDefault();

            const modal = document.getElementById('shiftDetailsModal');

            // Lade-Ansicht zeigen
            modal.classList.add('active');
            document.getElementById('modalShiftTitle').textContent = 'Lade Dienst...';
            document.getElementById('modalShiftDescription').textContent = 'Beschreibung...';

            const detailUrl = `${API_CONFIG.BASE_URL}${API_CONFIG.ENDPOINTS.SHIFTS}/${shiftId}`;

            authenticatedFetch(detailUrl)
                .then(response => {
                    if (!response.ok) throw new Error('Details konnten nicht geladen werden');
                    return response.json();
                })
                .then(shift => {
                    console.log('Detail-Daten aus der API:', shift);

                    document.getElementById('modalShiftTitle').textContent = shift.name || 'Ohne Titel';
                    document.getElementById('modalShiftDescription').textContent = shift.description || 'Keine Beschreibung';
                    document.getElementById('modalShiftRequirements').textContent = shift.requirements || 'Keine Anforderungen';
                    document.getElementById('modalShiftAgeRestriction').textContent = shift.ageRestriction || 'Keine Altersbeschränkung';
                    document.getElementById('modalShiftPointes').textContent = shift.points || 'Keine Beschreibung';
       
                })
                .catch(error => {
                    console.error('Fehler beim Abrufen der Details:', error);
                });
        }

        async function deleteShift(shiftId, shiftTitle) {
            if (!confirm(`Möchten Sie den Dienst "${shiftTitle}" wirklich unwiderruflich löschen?`)) {
                return;
            }

            try {
                const deleteUrl = `${API_CONFIG.BASE_URL}${API_CONFIG.ENDPOINTS.SHIFTS}/${shiftId}`;
                const response = await authenticatedFetch(deleteUrl, {
                    method: 'DELETE'
                });

                if (response.ok) {
                    alert('Dienst wurde erfolgreich gelöscht.');
                    location.reload();
                } else {
                    const error = await response.json();
                    alert(`Fehler beim Löschen: ${error.message || 'Unbekannter Fehler'}`);
                }
            } catch (error) {
                console.error('Fehler beim Löschen des Dienstes:', error);
                alert('Netzwerkfehler beim Löschen des Dienstes.');
            }
        }

        document.addEventListener('DOMContentLoaded', () => {

            // Modal schliessen Dienste
            const shiftDetailsModal = document.getElementById('shiftDetailsModal');
            document.getElementById('closeShiftModalBtn').addEventListener('click', () => {
                shiftDetailsModal.classList.remove('active');
            });
            shiftDetailsModal.addEventListener('click', (e) => {
                if (e.target === shiftDetailsModal) {
                    shiftDetailsModal.classList.remove('active');
                }
            });

            const apiUrl = `${API_CONFIG.BASE_URL}${API_CONFIG.ENDPOINTS.SHIFTS}`;
            const tableBody = document.querySelector('tbody');
            const cardwrapper = document.getElementById('cardwrapper');

            // --- Logik für das Erstellen eines Dienstes (POST) ---
            const showShiftFormBtn = document.getElementById('showShiftFormBtn');
            const cancelShiftFormBtn = document.getElementById('cancelShiftFormBtn');
            const createShiftForm = document.getElementById('createShiftForm');

            // Formular einblenden
            showShiftFormBtn.addEventListener('click', () => {
                createShiftForm.style.display = 'block';
                showShiftFormBtn.style.display = 'none';
            });

            // Formular ausblenden
            cancelShiftFormBtn.addEventListener('click', () => {
                createShiftForm.style.display = 'none';
                showShiftFormBtn.style.display = 'block';
                createShiftForm.reset();
            });

            // Beim Absenden des Formulars Daten per API speichern
            createShiftForm.addEventListener('submit', (e) => {
                e.preventDefault(); // Verhindert das Neuladen der Seite durch HTML

                // OrganizationId aus JWT-Token holen
                const userInfo = getUserInfo();
                if (!userInfo || !userInfo.OrganizationId) {
                    alert('Fehler: Keine Organisation gefunden. Bitte melden Sie sich erneut an.');
                    return;
                }

                // Wir sammeln die Daten aus den Input-Feldern zusammen, angepasst an das Swagger/API-Format
                const newShift = {
                    //id: 0, // 0 als Erkennungszeichen für 'Neuanlage'
                    name: document.getElementById('shiftTitle').value,
                    description: document.getElementById('shiftDescription').value,
                    requirements: document.getElementById('shiftRequirements').value,
                    ageRestriction: document.getElementById('shiftAgeRestriction').value,
                    points: document.getElementById('shiftPoints').value,
                    //Event-ID für Testzwecke
                    eventId: '2',
                    //organizationId: parseInt(userInfo.OrganizationId, 10)
                };

                // POST Request an dein C#-Backend mit Authentifizierung
                authenticatedFetch(apiUrl, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(newShift)
                })
                    .then(response => {
                        if (!response.ok) throw new Error('Fehler beim Speichern');
                        return response.text(); // Oder response.json(), falls Backend JSON liefert
                    })
                    .then(savedShift => {
                        console.log('Saved Shift');
                        alert('Dienst erfolgreich in der Datenbank gespeichert!');

                        // Formular aufräumen
                        createShiftForm.reset();
                        createShiftForm.style.display = 'none';
                        showShiftFormBtn.style.display = 'block';

                        // Damit das neue Event in der Liste auftaucht, laden wir die Seite einmal neu
                        location.reload();
                    })
                    .catch(error => {
                        console.error('Speichern fehlgeschlagen:', error);
                        alert('Datenbank-Speicherung fehlgeschlagen. Läuft die API?');
                    });
            });

            // Logik für das Abrufen der Liste (GET)
            const userInfo = getUserInfo();
            if (!userInfo || !userInfo.OrganizationId) {
                tableBody.innerHTML = '<tr><td colspan="6" style="text-align: center; padding: 20px; color: #ef4444;">Fehler: Keine Organisation gefunden. Bitte melden Sie sich erneut an.</td></tr>';
                return;
            }

            const apiUrlWithOrg = `${apiUrl}?organizationId=${userInfo.OrganizationId}`;

            //authenticatedFetch(apiUrlWithOrg)
            authenticatedFetch(apiUrl)
                .then(response => {
                    if (!response.ok) throw new Error('Netzwerk-Antwort war nicht ok');
                    return response.json();
                })
                .then(shifts => {
                    cardwrapper.innerHTML = '';

                    if (shifts.length === 0) {
                        tableBody.innerHTML = '<tr><td colspan="6" style="text-align: center; padding: 20px; color: var(--text-muted);">Kein Dienst für Ihre Organisation gefunden.</td></tr>';
                        return;
                    }

                    shifts.forEach(shift => {
                        const card = document.createElement('div');

                        card.classList.add('shift-card-s');
                        card.innerHTML = `
                            <div class="shift-card-header">
                                <div class="shift-card-icon"></div>
                                <h2 class="shift-card-title">${shift.name}</h2>
                            </div>
                            <p class="shift-card-description"> ${shift.description}</p>
                            <div style="display: flex; gap: 12px; align-items: center;">
                                <a href="#" onclick="loadShiftDetails(${shift.id})" class="action-link">Details</a>
                                <button onclick="deleteShift(${shift.id}, '${shift.name.replace(/'/g, "\\'")}')" class="action-link-danger">Löschen</button>
                            </div>
                        `;
                        cardwrapper.appendChild(card);
                    });
                })
                .catch(error => {
                    console.error('Fehler beim Laden der Dienste:', error);
                    tableBody.innerHTML = '<tr><td colspan="6" style="text-align: center; padding: 20px; color: #ef4444;">Fehler beim Laden der Dienste. Bitte versuchen Sie es später erneut.</td></tr>';
                });
        });
    </script>
</body>
