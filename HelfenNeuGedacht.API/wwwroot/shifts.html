    <main class="main-content">
        <header class="page-header">
            <div class="page-title">
                <h1>Dienste</h1>
                <p>Verwalten Sie Ihre Dienstvorlagen</p>
            </div>
            <button class="btn-primary" id="showShiftFormBtn">
                <svg width="16" height="16" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path>
                </svg>
                NEUEN DIENST ERSTELLEN
            </button>
        </header>
        <div class="shift-grid" id="cardwrapper"></div>
    </main>

    <!-- Shift Details Modal -->
    <div class="modal-overlay" id="shiftDetailsModal">
        <div class="modal-content">
            <div class="modal-header">
                <div class="modal-header-top">
                    <div class="modal-header-title">
                        <div class="modal-header-icon"></div>
                        <h2 id="detailShiftTitle">Lade Dienst...</h2>
                    </div>
                    <button class="modal-close-btn" id="closeShiftModalBtn">
                        <svg width="24" height="24" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                  d="M6 18L18 6M6 6l12 12"></path>
                        </svg>
                    </button>
                </div>
            </div>
            <div class="modal-body">
                <form id="editShiftForm" class="form-container">
                    <input type="number" id="editShiftId" placeholder="ID" required>
                    <input type="text" id="editShiftTitle" placeholder="Dienstbezeichnung" required>
                    <textarea id="editShiftDescription" placeholder="Beschreibung" rows="3" required></textarea>
                    <input type="text" id="editShiftRequirements" placeholder="Anforderungen">
                    <input type="number" id="editShiftAgeRestriction" placeholder="Altersbeschränkung">
                    <input type="number" id="editShiftPoints" placeholder="Punkte">
                    <div class="form-actions-row">
                        <button type="submit" class="btn-primary">Speichern</button>
                        <button class="btn-danger" id="deleteShiftButton">Löschen</button>
                        <button type="button" id="cancelEditingShiftFormBtn" class="btn-secondary">Abbrechen</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <!-- Shift Add Modal -->
    <div class="modal-overlay" id="shiftEditModal">
        <div class="modal-content">
            <div class="modal-header">
                <div class="modal-header-top">
                    <div class="modal-header-title">
                        <div class="modal-header-icon"></div>
                        <h2 id="modalShiftTitle">Neuen Dienst erstellen</h2>
                    </div>
                    <button class="modal-close-btn" id="closeEditShiftModalBtn">
                        <svg width="24" height="24" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                  d="M6 18L18 6M6 6l12 12"></path>
                        </svg>
                    </button>
                </div>
            </div>
            <div class="modal-body">
                <form id="createShiftForm" class="form-container">
                    <input type="text" id="shiftTitle" placeholder="Dienstbezeichnung" required>
                    <textarea id="shiftDescription" placeholder="Beschreibung" rows="3" required></textarea>
                    <input type="text" id="shiftRequirements" placeholder="Anforderungen">
                    <input type="number" id="shiftAgeRestriction" placeholder="Altersbeschränkung">
                    <input type="number" id="shiftPoints" placeholder="Punkte">
                    <div class="form-actions-row">
                        <button type="submit" class="btn-primary">Speichern</button>
                        <button type="button" id="cancelShiftFormBtn" class="btn-secondary">Abbrechen</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="config.js"></script>
    <script src="auth.js"></script>
    <script>

        // Auth-Guard: Prüfe ob Benutzer eingeloggt ist
        requireAuth();

        // Hilfsfunktion zum Schließen aller Modale
        function closeAllModals() {
            document.querySelectorAll('.modal-overlay').forEach(modal => {
                modal.classList.remove('active');
            });
            document.getElementById('createShiftForm').reset();
            document.getElementById('editShiftForm').reset();
        }

        function loadShiftDetails(shiftId) { 
            if (window.event) window.event.preventDefault();

            const modal = document.getElementById('shiftDetailsModal');
            modal.classList.add('active');
            document.getElementById('detailShiftTitle').textContent = 'Lade Dienst...';

            const detailUrl = `${API_CONFIG.BASE_URL}${API_CONFIG.ENDPOINTS.SHIFTS}/${shiftId}`;

            authenticatedFetch(detailUrl)
                .then(response => {
                    if (!response.ok) throw new Error('Details konnten nicht geladen werden');
                    return response.json();
                })
                .then(shift => {
                    document.getElementById('detailShiftTitle').textContent = (shift.name || 'Dienst') + " - Detailansicht";
                    document.getElementById('editShiftId').value = shift.id;
                    document.getElementById('editShiftTitle').value = shift.name || '';
                    document.getElementById('editShiftDescription').value = shift.description || '';
                    document.getElementById('editShiftRequirements').value = shift.requirements || '';
                    document.getElementById('editShiftAgeRestriction').value = shift.ageRestriction || '';
                    document.getElementById('editShiftPoints').value = shift.points || '';

                    const deleteBtn = document.getElementById('deleteShiftButton');
                    const newDeleteBtn = deleteBtn.cloneNode(true);
                    deleteBtn.parentNode.replaceChild(newDeleteBtn, deleteBtn);

                    newDeleteBtn.addEventListener('click', () => {
                        deleteShift(shift.id, shift.name);
                    });
                })
                .catch(error => {
                    console.error('Fehler:', error);
                    alert("Fehler beim Laden der Details.");
                    closeAllModals();
                });
        }

        async function deleteShift(shiftId, shiftTitle) {
            if (!confirm(`Möchten Sie den Dienst "${shiftTitle}" wirklich löschen?`)) return;

            try {
                const deleteUrl = `${API_CONFIG.BASE_URL}${API_CONFIG.ENDPOINTS.SHIFTS}/${shiftId}`;
                const response = await authenticatedFetch(deleteUrl, { method: 'DELETE' });

                if (response.ok) {
                    location.reload();
                } else {
                    alert('Fehler beim Löschen.');
                }
            } catch (error) {
                console.error('Löschfehler:', error);
            }
        }

        document.addEventListener('DOMContentLoaded', () => {
            const shiftDetailsModal = document.getElementById('shiftDetailsModal');
            const shiftEditModal = document.getElementById('shiftEditModal');
            const cardwrapper = document.getElementById('cardwrapper');

            // --- Schließen-Logik vereinheitlichen ---
            const closeButtons = [
                'closeShiftModalBtn',
                'cancelEditingShiftFormBtn',
                'closeEditShiftModalBtn',
                'cancelShiftFormBtn'
            ];

            closeButtons.forEach(id => {
                const btn = document.getElementById(id);
                if (btn) btn.addEventListener('click', closeAllModals);
            });

            [shiftDetailsModal, shiftEditModal].forEach(m => {
                m.addEventListener('click', (e) => {
                    if (e.target === m) closeAllModals();
                });
            });

            document.getElementById('showShiftFormBtn').addEventListener('click', () => {
                shiftEditModal.classList.add('active');
            });

            document.getElementById('createShiftForm').addEventListener('submit', (e) => {
                e.preventDefault();
                const userInfo = getUserInfo();

                const newShift = {
                    name: document.getElementById('shiftTitle').value,
                    description: document.getElementById('shiftDescription').value,
                    requirements: document.getElementById('shiftRequirements').value,
                    ageRestriction: parseInt(document.getElementById('shiftAgeRestriction').value) || 0,
                    points: parseInt(document.getElementById('shiftPoints').value) || 0,
                    //Vorerst statisch
                    eventId: 1
                };

                authenticatedFetch(`${API_CONFIG.BASE_URL}${API_CONFIG.ENDPOINTS.SHIFTS}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(newShift)
                })
                    .then(res => res.ok ? location.reload() : alert("Fehler beim Speichern"));
            });

            document.getElementById('editShiftForm').addEventListener('submit', (e) => {
                e.preventDefault();
                const id = document.getElementById('editShiftId').value;

                const editedShift = {
                    id: id,
                    name: document.getElementById('editShiftTitle').value,
                    description: document.getElementById('editShiftDescription').value,
                    requirements: document.getElementById('editShiftRequirements').value,
                    ageRestriction: parseInt(document.getElementById('editShiftAgeRestriction').value) || 0,
                    points: parseInt(document.getElementById('editShiftPoints').value) || 0,
                    eventId: 1
                };

                authenticatedFetch(`${API_CONFIG.BASE_URL}${API_CONFIG.ENDPOINTS.SHIFTS}/${id}`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(editedShift)
                })
                    .then(res => res.ok ? location.reload() : alert("Fehler beim Update"));
            });

            authenticatedFetch(`${API_CONFIG.BASE_URL}${API_CONFIG.ENDPOINTS.SHIFTS}`)
                .then(res => res.json())
                .then(shifts => {
                    cardwrapper.innerHTML = '';
                    shifts.forEach(shift => {
                        const card = document.createElement('div');
                        card.className = 'shift-card-s';
                        card.innerHTML = `
                    <div class="shift-card-header">
                        <div class="shift-card-icon"></div>
                        <h2 class="shift-card-title">${shift.name}</h2>
                    </div>
                    <p class="shift-card-description">${shift.description}</p>
                    <div style="display: flex; gap: 12px; align-items: center;">
                        <button onclick="loadShiftDetails(${shift.id})" class="btn-primary">Details</button>
                    </div>
                `;
                        cardwrapper.appendChild(card);
                    });
                });
        });

    </script>
</body>

</html>
