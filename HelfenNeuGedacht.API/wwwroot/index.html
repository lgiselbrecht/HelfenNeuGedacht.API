<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Helfen neu gedacht</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="loading-screen">
        <div class="loading-logo">H</div>
        <h1>Helfen neu gedacht</h1>
        <p class="loading-text">Einen Moment bitte...</p>
        <div class="loading-spinner"></div>
    </div>

    <!-- Scripts -->
    <script src="config.js"></script>
    <script src="auth.js"></script>
    <script>
        // Smart Redirect: Check authentication and redirect accordingly
        document.addEventListener('DOMContentLoaded', () => {
            // Kleine Verzögerung für bessere UX (optional)
            setTimeout(() => {
                if (isAuthenticated()) {
                    // Benutzer ist eingeloggt → Weiterleitung zum Dashboard
                    window.location.href = 'Dashboard.html';
                } else {
                    // Benutzer ist nicht eingeloggt → Weiterleitung zum Login
                    window.location.href = 'login.html';
                }
            }, 500); // 500ms Verzögerung, damit man die Ladeanimation kurz sieht
        });
    </script>
</body>
</html>
