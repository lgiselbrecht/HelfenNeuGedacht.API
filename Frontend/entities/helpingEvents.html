    <main class="main-content">
        <header class="page-header">
            <div class="page-title">
                <h1>Veranstaltungen</h1>
                <p>Verwalten Sie Ihre Events und die zugehörigen Dienste</p>
            </div>
            <button class="btn-primary" id="showFormBtn">
                <svg width="16" height="16" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path>
                </svg>
                NEUE VERANSTALTUNG ERSTELLEN
            </button>
        </header>

        <form id="createEventForm" class="form-container" style="display: none; max-width: 500px;">
            <input type="text" id="eventTitle" placeholder="Veranstaltungs-Titel" required>
            <textarea id="eventDescription" placeholder="Beschreibung" rows="3" required></textarea>
            <input type="text" id="eventLocation" placeholder="Ort" required>
            <label>Start: <input type="datetime-local" id="eventStartDate" required></label>
            <label>Ende: <input type="datetime-local" id="eventEndDate" required></label>
            <label>Organisations-ID: <input type="number" id="eventOrganizationId" value="1" required></label>
            <div style="display: flex; gap: 10px; margin-top: 15px;">
                <button type="submit" class="btn-primary">In Datenbank Speichern</button>
                <button type="button" id="cancelFormBtn"
                    style="padding: 10px 20px; border-radius: 6px; border: 1px solid #e5e7eb; background: white; cursor: pointer; font-weight: 500;">Abbrechen</button>
            </div>
        </form>

        <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th>Veranstaltung</th>
                        <th>Startdatum</th>
                        <th>Ort</th>
                        <th>Enddatum</th>
                        <th>Anzahl Helfer</th>
                        <th>Aktion</th>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <td colspan="6" style="text-align: center; padding: 20px;">Lade Veranstaltungen ...</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </main>

    <script>
        function loadEventDetails(eventId) {
            // Verhindert, dass der # Link die Seite nach oben springen lässt
            if (event) event.preventDefault();
            const detailUrl = `http://localhost:5062/api/events/${eventId}`;

            fetch(detailUrl)
                .then(response => {
                    if (!response.ok) throw new Error('Details konnten nicht geladen werden');
                    return response.json();
                })
                .then(eventDetails => {
                    console.log('Detail-Daten aus der API:', eventDetails);
                    alert(`Erfolgreich geladen!\nTitel: ${eventDetails.title}\nBeschreibung: ${eventDetails.description}\nOrt: ${eventDetails.location}`);
                })
                .catch(error => {
                    console.error('Fehler beim Abrufen der Details:', error);
                    alert('Fehler beim Abrufen der Details für ID: ' + eventId);
                });
        }

        document.addEventListener('DOMContentLoaded', () => {

            const apiUrl = 'http://localhost:5062/api/events';
            const tableBody = document.querySelector('tbody');

            // --- Logik für das Erstellen einer neuen Veranstaltung (POST) ---
            const showFormBtn = document.getElementById('showFormBtn');
            const cancelFormBtn = document.getElementById('cancelFormBtn');
            const createEventForm = document.getElementById('createEventForm');

            // Formular einblenden
            showFormBtn.addEventListener('click', () => {
                createEventForm.style.display = 'block';
                showFormBtn.style.display = 'none';
            });

            // Formular ausblenden
            cancelFormBtn.addEventListener('click', () => {
                createEventForm.style.display = 'none';
                showFormBtn.style.display = 'block';
                createEventForm.reset();
            });

            // Beim Absenden des Formulars Daten per API speichern
            createEventForm.addEventListener('submit', (e) => {
                e.preventDefault(); // Verhindert das Neuladen der Seite durch HTML

                // Wir sammeln die Daten aus den Input-Feldern zusammen, angepasst an das Swagger/API-Format
                const newEvent = {
                    id: 0, // 0 als Erkennungszeichen für 'Neuanlage'
                    title: document.getElementById('eventTitle').value,
                    description: document.getElementById('eventDescription').value,
                    location: document.getElementById('eventLocation').value,
                    startDate: new Date(document.getElementById('eventStartDate').value).toISOString(),
                    endDate: new Date(document.getElementById('eventEndDate').value).toISOString(),
                    organizationId: parseInt(document.getElementById('eventOrganizationId').value, 10)
                };

                // POST Request an dein C#-Backend, um es in der Docker-Datenbank zu speichern
                fetch(apiUrl, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(newEvent)
                })
                    .then(response => {
                        if (!response.ok) throw new Error('Fehler beim Speichern');
                        return response.json(); // Oder response.text(), falls Backend kein JSON liefert
                    })
                    .then(savedEvent => {
                        alert('Veranstaltung erfolgreich in der Datenbank gespeichert!');

                        // Formular aufräumen
                        createEventForm.reset();
                        createEventForm.style.display = 'none';
                        showFormBtn.style.display = 'block';

                        // Damit das neue Event in der Liste auftaucht, laden wir die Seite einmal neu
                        location.reload();
                    })
                    .catch(error => {
                        console.error('Speichern fehlgeschlagen:', error);
                        alert('Datenbank-Speicherung fehlgeschlagen. Läuft die API?');
                    });
            });

            // Logik für das Abrufen der Liste (GET) ---

            fetch(apiUrl)
                .then(response => {
                    if (!response.ok) throw new Error('Netzwerk-Antwort war nicht ok');
                    return response.json();
                })
                .then(events => {
                    tableBody.innerHTML = '';

                    events.forEach(event => {
                        const tr = document.createElement('tr');

                        tr.innerHTML = `
                            <td>
                                <div class="event-cell">
                                    <div class="event-icon"></div>
                                    <span>${event.title}</span>
                                </div>
                            </td>
                            <td>${new Date(event.startDate).toLocaleDateString('de-DE')}</td>
                            <td>
                                <div class="location-cell">
                                    <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 11a3 3 0 11-6 0 3 3 0 016 0z"></path></svg>
                                    ${event.location}
                                </div>
                            </td>
                            <td>${new Date(event.endDate).toLocaleDateString('de-DE')}</td>
                            <td><span style="color: var(--text-muted); font-size: 0.8rem;">#${event.id}</span></td>
                            <td><a href="#" onclick="loadEventDetails(${event.id})" class="action-link">Details ansehen &rarr;</a></td>
                        `;

                        tableBody.appendChild(tr);
                    });
                })
                .catch(error => console.error('Fehler beim Laden der Veranstaltungen:', error));
        });
    </script>
</body>

</html>
